<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slider">
  
  <div class="slides">
    <img src="./images/Iron Man Picture.jpg" class="slide active">
    <img src="./images/iron man 2.jpg" class="slide">
    <img src="./images/Iron man 3.jpg" class="slide">
    <img src="./images/iron man 2.jpg" class="slide">
  </div>

  <!-- Buttons -->
  <button class="prev">&#10094;</button>
  <button class="next">&#10095;</button>

  <!-- Dots -->
  <div class="dots"></div>

</div>

<script src="script.js"></script>
</body>
</html>
